openapi: 3.1.0
info:
  title: Continuum Tracker — Public API
  version: 1.0.0
  description: 'Public REST API for Continuum Tracker.


    Authenticate every request with `Authorization: Bearer <api_key>`. Generate or
    rotate a key in the web app at `/settings/access`.


    Rate limits are per-key (in-memory, slowapi). When a limit is hit the server returns
    HTTP 429 with a `retry_after` (seconds) field in the body and a matching `Retry-After`
    header.


    All listing endpoints share the same envelope: `{ items: [...], pagination: {
    total, page, limit, total_pages } }`.'
  contact:
    name: Continuum Tracker
    url: https://www.continuumtracker.com
paths:
  /v1/projects:
    get:
      tags:
      - Project Routes
      summary: Get Projects
      description: Get user's projects.
      operationId: get_projects_v1_projects_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number
          default: 1
          title: Page
        description: Page number
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 10
          title: Limit
        description: Items per page
      - name: include_archived
        in: query
        required: false
        schema:
          type: boolean
          description: Include archived (soft-deleted) projects
          default: false
          title: Include Archived
        description: Include archived (soft-deleted) projects
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /v1/projects/{projectId}/feedbacks:
    get:
      tags:
      - Feedback Routes
      summary: Get Feedbacks
      description: Get feedbacks for project.
      operationId: get_feedbacks_v1_projects__projectId__feedbacks_get
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number
          default: 1
          title: Page
        description: Page number
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Items per page
          default: 10
          title: Limit
        description: Items per page
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search query (filters by name or feedback_original)
          title: Search
        description: Search query (filters by name or feedback_original)
      - name: sort_by
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Sort by field (created_at, name, status)
          title: Sort By
        description: Sort by field (created_at, name, status)
      - name: sort_dir
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Sort direction (asc, desc)
          title: Sort Dir
        description: Sort direction (asc, desc)
      - name: include_archived
        in: query
        required: false
        schema:
          type: boolean
          description: Include archived (soft-deleted) feedbacks. When true, archived
            rows are returned at the bottom.
          default: false
          title: Include Archived
        description: Include archived (soft-deleted) feedbacks. When true, archived
          rows are returned at the bottom.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackListResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Feedback Routes
      summary: Archive Feedbacks Bulk
      description: 'Bulk archive (soft-delete) feedbacks by ID.


        Request body is an **array of objects**: ``[{"id": "uuid"}, ...]``.

        Returns 200 if at least one item was archived; 422 if the list is empty or
        all failed.

        Already-archived entries are returned in ``failed`` with code ``ALREADY_ARCHIVED``.'
      operationId: archive_feedbacks_bulk_v1_projects__projectId__feedbacks_delete
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/FeedbackBulkArchiveItemApi'
              title: Items
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackBulkArchiveResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
    post:
      tags:
      - Feedback Routes
      summary: Create Feedback
      description: "Create feedback for project.\n\nAccepts either a single ``FeedbackCreateRequestApi``\
        \ object **or** a JSON\narray of them for bulk creation.\n\n* **Single object**\
        \ → returns ``FeedbackResponseApi`` with HTTP 201.\n* **Array** → returns\
        \ ``FeedbackBulkCreateResponseApi`` with HTTP 201 if\n  at least one item\
        \ succeeded, or HTTP 422 if all items failed."
      operationId: create_feedback_v1_projects__projectId__feedbacks_post
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/FeedbackResponseApi'
                - $ref: '#/components/schemas/FeedbackBulkCreateResponseApi'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
      requestBody:
        required: true
        description: Either a single feedback object **or** an array for bulk import.
          Bulk mode returns a per-item result set.
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/FeedbackCreateRequestApi'
              - type: array
                items:
                  $ref: '#/components/schemas/FeedbackCreateRequestApi'
      security:
      - bearerAuth: []
  /v1/projects/{projectId}/feedbacks/{feedbackId}:
    get:
      tags:
      - Feedback Routes
      summary: Get Feedback
      description: Get feedback by id. Pass include=painpoint to embed related painpoints.
      operationId: get_feedback_v1_projects__projectId__feedbacks__feedbackId__get
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      - name: feedbackId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Feedbackid
      - name: include
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Comma-separated relations to include. Supported: painpoint'
          title: Include
        description: 'Comma-separated relations to include. Supported: painpoint'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/FeedbackWithPainpointsResponseApi'
                - $ref: '#/components/schemas/FeedbackResponseApi'
                title: Response Get Feedback V1 Projects  Projectid  Feedbacks  Feedbackid  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
    put:
      tags:
      - Feedback Routes
      summary: Update Feedback
      description: Update feedback. Returns 409 ``archived`` if the feedback is archived.
      operationId: update_feedback_v1_projects__projectId__feedbacks__feedbackId__put
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      - name: feedbackId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Feedbackid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackUpdateRequestApi'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Feedback Routes
      summary: Archive Feedback
      description: Archive (soft-delete) feedback. Returns 409 if already archived.
      operationId: archive_feedback_v1_projects__projectId__feedbacks__feedbackId__delete
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      - name: feedbackId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Feedbackid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackDeleteResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /v1/projects/{projectId}/signals:
    get:
      tags:
      - Signal Routes
      summary: Get Signals
      description: Get signals for project (paginated). Optionally filter by category
        and/or is_saved.
      operationId: get_signals_v1_projects__projectId__signals_get
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number
          default: 1
          title: Page
        description: Page number
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 10
          title: Limit
        description: Items per page
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search query (name, signal_original)
          title: Search
        description: Search query (name, signal_original)
      - name: sort_by
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Sort by field (created_at, name)
          title: Sort By
        description: Sort by field (created_at, name)
      - name: sort_dir
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Sort direction (asc, desc)
          title: Sort Dir
        description: Sort direction (asc, desc)
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/SignalCategoryEnum'
          - type: 'null'
          description: Filter by signal category (repeat param for multiple)
          title: Category
        description: Filter by signal category (repeat param for multiple)
      - name: is_saved
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: If true, return only signals saved by current user
          title: Is Saved
        description: If true, return only signals saved by current user
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalListResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
    post:
      tags:
      - Signal Routes
      summary: Create Signal
      description: Create manual signal (category=ManualPainPoint) with optional linked
        feedback.
      operationId: create_signal_v1_projects__projectId__signals_post
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalCreateRequestApi'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalCreateResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /v1/projects/{projectId}/signals/{signalId}:
    get:
      tags:
      - Signal Routes
      summary: Get Signal
      description: Get signal by id.
      operationId: get_signal_v1_projects__projectId__signals__signalId__get
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      - name: signalId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Signalid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
    put:
      tags:
      - Signal Routes
      summary: Update Signal
      description: Update signal.
      operationId: update_signal_v1_projects__projectId__signals__signalId__put
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      - name: signalId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Signalid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalUpdateRequestApi'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Signal Routes
      summary: Delete Signal
      description: Soft delete signal.
      operationId: delete_signal_v1_projects__projectId__signals__signalId__delete
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Projectid
      - name: signalId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Signalid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalDeleteResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /v1/me:
    get:
      tags:
      - Me
      summary: Get Me
      description: Current user (works with API key or session email).
      operationId: get_me_v1_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponseApi'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
components:
  schemas:
    AdminGrantListItemApi:
      properties:
        id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Id
        kind:
          type: string
          title: Kind
        amount:
          type: integer
          title: Amount
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
        expires_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Expires At
        period_start:
          type: string
          title: Period Start
        period_end:
          type: string
          title: Period End
        created_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Created At
        granted_by_user:
          anyOf:
          - $ref: '#/components/schemas/GrantedByUserApi'
          - type: 'null'
      type: object
      required:
      - kind
      - amount
      - period_start
      - period_end
      title: AdminGrantListItemApi
    AdminGrantResponseApi:
      properties:
        grant:
          $ref: '#/components/schemas/LedgerEntryApi'
        org_credits:
          $ref: '#/components/schemas/OrgCreditsApi'
      type: object
      required:
      - grant
      - org_credits
      title: AdminGrantResponseApi
    AdminGrantsListResponseApi:
      properties:
        items:
          items:
            $ref: '#/components/schemas/AdminGrantListItemApi'
          type: array
          title: Items
        pagination:
          $ref: '#/components/schemas/PaginationInfoApi'
      type: object
      required:
      - items
      - pagination
      title: AdminGrantsListResponseApi
    ApiKeyResponseApi:
      properties:
        api_key:
          type: string
          title: Api Key
          description: The freshly generated API key (plaintext, shown once)
        created_at:
          type: string
          title: Created At
          description: When the key was generated
      type: object
      required:
      - api_key
      - created_at
      title: ApiKeyResponseApi
      description: 'Returned once on generate / regenerate — the only time the full
        key is

        surfaced to the client.'
    BackendUserResponseApi:
      properties:
        id:
          type: string
          format: uuid
          title: Id
          description: User UUID
        email:
          type: string
          title: Email
          description: User email address
        name:
          type: string
          title: Name
          description: User full name
        role:
          type: string
          title: Role
          description: User role in the system (converted from enum)
        image:
          anyOf:
          - type: string
          - type: 'null'
          title: Image
          description: User profile image URL
        email_verified:
          type: boolean
          title: Email Verified
          description: Email verification status
        given_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Given Name
          description: User's given/first name
        family_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Family Name
          description: User's family/last name
        locale:
          anyOf:
          - type: string
          - type: 'null'
          title: Locale
          description: User's locale/language preference
        hd:
          anyOf:
          - type: string
          - type: 'null'
          title: Hd
          description: Hosted domain for Google Workspace users
        newsletter_subscribed:
          type: boolean
          title: Newsletter Subscribed
          description: Newsletter subscription flag
          default: false
        accepted_tc_version:
          anyOf:
          - type: integer
          - type: 'null'
          title: Accepted Tc Version
          description: Latest accepted T&C version
        participation_in_studies:
          type: boolean
          title: Participation In Studies
          description: Participation in studies flag
          default: false
        last_login_at:
          type: string
          title: Last Login At
          description: Last login timestamp
        created_at:
          type: string
          title: Created At
          description: Account creation timestamp
        updated_at:
          type: string
          title: Updated At
          description: Account update timestamp
        api_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Api Key
          description: API key for the user
        company_analyses:
          items:
            $ref: '#/components/schemas/UserCompanyAnalysisApi'
          type: array
          title: Company Analyses
          description: Company analysis history
        organizations:
          items:
            $ref: '#/components/schemas/OrgSummaryApi'
          type: array
          title: Organizations
          description: Organizations the user is a member of
        default_organization_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Default Organization Id
          description: ID of the user's default (owner) organization
      type: object
      required:
      - id
      - email
      - name
      - role
      - email_verified
      - last_login_at
      - created_at
      - updated_at
      title: BackendUserResponseApi
      description: Complete backend user response with all fields.
    BiasIdleFlushApi:
      properties:
        exploration_seconds:
          type: integer
          maximum: 86400.0
          minimum: 1.0
          title: Exploration Seconds
        conversation_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Conversation Id
      type: object
      required:
      - exploration_seconds
      title: BiasIdleFlushApi
    BillingDetailsUpdateRequestApi:
      properties:
        company_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Company Name
          description: Company name
        vat_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Vat Id
          description: VAT ID
        street:
          anyOf:
          - type: string
          - type: 'null'
          title: Street
          description: Street line 1
        street_line2:
          anyOf:
          - type: string
          - type: 'null'
          title: Street Line2
          description: Street line 2
        city:
          anyOf:
          - type: string
          - type: 'null'
          title: City
          description: City
        state:
          anyOf:
          - type: string
          - type: 'null'
          title: State
          description: State/region
        zip:
          anyOf:
          - type: string
          - type: 'null'
          title: Zip
          description: ZIP/postal code
        country:
          anyOf:
          - type: string
          - type: 'null'
          title: Country
          description: ISO-3166-1 alpha-2
        billing_contact_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Billing Contact Name
          description: Billing contact name
      type: object
      title: BillingDetailsUpdateRequestApi
      description: Request model for updating org billing details.
    BlogCategoryApi:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        name:
          additionalProperties:
            type: string
          type: object
          title: Name
        color:
          anyOf:
          - type: string
          - type: 'null'
          title: Color
        sort_order:
          type: integer
          title: Sort Order
          default: 0
      type: object
      required:
      - id
      - name
      title: BlogCategoryApi
    BlogCategoryCreateApi:
      properties:
        name:
          additionalProperties:
            type: string
          type: object
          title: Name
        color:
          anyOf:
          - type: string
          - type: 'null'
          title: Color
        sort_order:
          type: integer
          title: Sort Order
          default: 0
      type: object
      required:
      - name
      title: BlogCategoryCreateApi
    BlogCategoryListResponseApi:
      properties:
        items:
          items:
            $ref: '#/components/schemas/BlogCategoryApi'
          type: array
          title: Items
      type: object
      required:
      - items
      title: BlogCategoryListResponseApi
    BlogCategoryUpdateApi:
      properties:
        name:
          additionalProperties:
            type: string
          type: object
          title: Name
        color:
          anyOf:
          - type: string
          - type: 'null'
          title: Color
        sort_order:
          type: integer
          title: Sort Order
          default: 0
      type: object
      required:
      - name
      title: BlogCategoryUpdateApi
    BlogContentExtraction:
      properties:
        published_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Published Date
