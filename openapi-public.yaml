    ErrorResponse:
      type: object
      required:
      - detail
      properties:
        detail:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Machine-readable error code, e.g. VALIDATION_ERROR, RATE_LIMIT_EXCEEDED,
                ARCHIVED.
              example: VALIDATION_ERROR
            message:
              type: string
            fields:
              type: array
              items:
                $ref: '#/components/schemas/FieldError'
              description: Set when per-field validation failed.
            retry_after:
              type: integer
              description: Seconds to wait before retrying. Set on 429 responses.
    FieldError:
      type: object
      required:
      - field
      - code
      - message
      properties:
        field:
          type: string
          description: Dot-notation path to the offending field, e.g. address.city.
        code:
          type: string
        message:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ContinuumTrackerApiKey
      description: Self-issued API key, prefix `ct_`. Generate or rotate a key in
        the web app at `/settings/access`.
  responses:
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Caller is authenticated but not allowed for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource does not exist or is not visible to the caller.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Operation conflicts with the current resource state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request payload failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Per-key rate limit exceeded. Honour Retry-After (seconds) and the
        `retry_after` field in the response body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
